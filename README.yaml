description: |-
  Cloud-agnostic Terraform base module for MySQL database, user, and grant management.
  Designed to be called from cloud-specific management modules (AWS, GCP, Azure) via
  `module "db" { providers = { mysql = mysql } }`. Manages MySQL databases, users, and
  privilege grants (owner / readwrite / readonly) with optional time-based password rotation.

# Introduction to the project
introduction: |-
  This module provides a cloud-agnostic way to manage MySQL databases and users using the
  `winebarrel/mysql` Terraform provider. It does not include any cloud provider configuration —
  the `mysql` provider must be passed in from the calling (cloud-specific) module.

  Resources managed:
  - `mysql_database` — one per entry in `var.databases`
  - `mysql_user` + `random_password` — one per entry in `var.users`
  - `mysql_grant` — per (user, database) pair, with privilege sets matching the grant type
  - `time_rotating` — optional, triggers password rotation after `password_rotation_period` days

# How to use this project
usage: |-
  Call this module from a cloud-specific management module, passing in a configured `mysql`
  provider alias:

  ```hcl
  # terragrunt.hcl (cloud module)
  terraform {
    source = "git::https://github.com/cloudopsworks/terraform-module-mysql-management.git?ref=v1.0.1"
  }

  inputs = {
    org = {
      organization_name = "myorg"
      organization_unit = "platform"
      environment_type  = "production"
      environment_name  = "prod"
    }

    databases = {
      app = {
        name      = "appdb"          # (Required) Database name
        charset   = "utf8mb4"        # (Optional) Default: "utf8mb4"
        collation = "utf8mb4_unicode_ci"  # (Optional) Default: "utf8mb4_unicode_ci"
      }
    }

    users = {
      app_owner = {
        name      = "appowner"       # (Required) MySQL user name
        host      = "%"              # (Optional) Host restriction. Default: "%"
        grant     = "owner"          # (Required) Grant type: owner | readwrite | readonly
        #                            #   owner     → ALL privileges on the database(s)
        #                            #   readwrite → SELECT, INSERT, UPDATE, DELETE, CREATE, DROP, INDEX, ALTER
        #                            #   readonly  → SELECT only
        databases = ["appdb"]        # (Required) List of database names to grant access on
      }
      app_writer = {
        name      = "appwriter"      # (Required) MySQL user name
        host      = "%"              # (Optional) Host restriction. Default: "%"
        grant     = "readwrite"      # (Required) Grant type
        databases = ["appdb"]        # (Required) List of database names to grant access on
      }
      app_reader = {
        name      = "appreader"      # (Required) MySQL user name
        host      = "%"              # (Optional) Host restriction. Default: "%"
        grant     = "readonly"       # (Required) Grant type
        databases = ["appdb"]        # (Required) List of database names to grant access on
      }
    }

    password_rotation_period = 90    # (Optional) Days between password rotations. Default: 0 (disabled)
    force_reset              = false # (Optional) Force password reset on next apply. Default: false
  }
  ```

# Example usage
examples: |-
  See `usage` above for a full Terragrunt example. The module exports the following outputs
  for use by the cloud wrapper module to store passwords in a secret manager:

  | Output | Sensitive | Description |
  |---|---|---|
  | `owner_passwords` | yes | `map(user_ref → password)` for `owner`-grant users |
  | `owner_usernames` | no | `map(user_ref → MySQL username)` for `owner`-grant users |
  | `user_passwords` | yes | `map(user_ref → password)` for `readwrite`/`readonly` users |
  | `user_usernames` | no | `map(user_ref → MySQL username)` for `readwrite`/`readonly` users |
  | `databases` | no | `map(db_ref → { name })` for all managed databases |
  | `users` | no | `map(user_ref → { name, grant })` for all managed users |

  **Grant privilege sets**

  | Grant type | MySQL privileges granted |
  |---|---|
  | `owner` | `ALL` |
  | `readwrite` | `SELECT, INSERT, UPDATE, DELETE, CREATE, DROP, INDEX, ALTER` |
  | `readonly` | `SELECT` |

# How to get started quickly
quickstart: |-
  1. Reference this module from your cloud-specific Terragrunt stack, providing a configured
     `mysql` provider alias.
  2. Define your `databases` and `users` maps in `inputs.yaml` (see `.boilerplate/inputs.yaml`).
  3. Run `terragrunt apply`.

